# Keep Bluetooth audio nodes from being suspended when idle.
# This avoids speakers that play connect/disconnect tones every time PipeWire
# opens/closes the A2DP transport.
monitor.bluez.rules = [
  {
    matches = [
      {
        node.name = "~bluez_output.*"
      }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
